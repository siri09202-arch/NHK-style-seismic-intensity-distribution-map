佐賀県南部（さがけんなんぶ） [721]

沖縄県西表島（おきなわけんいりおもてじま） [807]
`;

        // パースしてオブジェクトに格納
        const epicenterData = {};
        epicenterRawList.trim().split('\n').forEach(line => {
            const match = line.match(/(.+?)（(.+?)）\s*\[(\d+)\]/);
            if (match) {
                epicenterData[match[3]] = { 
                    name: match[1], 
                    kana: match[2], 
                    code: match[3], 
                    lon: null, 
                    lat: null, 
                    feature: null 
                };
            }
        });

        // ユーザー指定の極めて正確なNHK風震度カラーパレット（袋文字の有無と視認性に配慮）
        const shindoLevels = [
            { id: '7', label: '7', bg: '#8C0028', fg: '#FFFFFF' },
            { id: '6+', label: '6-', bg: '#BE0000', fg: '#FFFFFF' },
            { id: '6-', label: '6-', bg: '#F03200', fg: '#FFFFFF' },
            { id: '5+', label: '5+', bg: '#FF9600', fg: '#000000' },
            { id: '5-', label: '5-', bg: '#FFD200', fg: '#000000' },
            { id: '4', label: '4', bg: '#FFFF96', fg: '#000000' },
            { id: '3', label: '3', bg: '#78E6DC', fg: '#000000' }, 
            { id: '2', label: '2', bg: '#1E82E6', fg: '#FFFFFF' },
            { id: '1', label: '1', bg: '#3C5A82', fg: '#FFFFFF' }
        ];

        let activeMode = 'shindo'; // 'shindo' または 'epicenter'
        let currentSelectedLevel = '4'; // デフォルト選択震度
        let icons = []; // 配置された震度アイコンの配列
        let currentTransform = d3.zoomIdentity; // 現在のズーム状態
        
        // 震源地データ (1点のみ。初期は宮崎沖日向灘エリア)
        let epicenterLocation = { lon: 131.65, lat: 32.15, visible: true }; 

        // --------------------------------------------------
        // UIイベントおよび制御
        // --------------------------------------------------
        const selector = document.getElementById('shindo-selector');
        
        // モード変更
        document.getElementById('mode-shindo').addEventListener('click', () => {
            activeMode = 'shindo';
            document.getElementById('mode-shindo').className = 'bg-blue-600 px-2.5 py-1 rounded font-bold transition-all';
            document.getElementById('mode-epicenter').className = 'hover:bg-gray-600 px-2.5 py-1 rounded transition-all text-gray-300';
        });

        document.getElementById('mode-epicenter').addEventListener('click', () => {
            activeMode = 'epicenter';
            document.getElementById('mode-shindo').className = 'hover:bg-gray-600 px-2.5 py-1 rounded transition-all text-gray-300';
            document.getElementById('mode-epicenter').className = 'bg-blue-600 px-2.5 py-1 rounded font-bold transition-all';
        });

        function updateSelectorUI() {
            Array.from(selector.querySelectorAll('button')).forEach(btn => {
                if (btn.dataset.id === currentSelectedLevel) {
                    btn.className = 'flex-shrink-0 w-11 h-11 rounded border-2 border-white ring-2 ring-blue-400 font-bold text-sm shadow-md transition-transform scale-110 z-10 cursor-pointer';
                } else {
                    btn.className = 'flex-shrink-0 w-11 h-11 rounded border border-gray-600 font-bold text-sm shadow-sm transition-transform hover:scale-105 opacity-80 hover:opacity-100 cursor-pointer';
                }
            });
        }

        shindoLevels.forEach(level => {
            const btn = document.createElement('button');
            btn.dataset.id = level.id;
            btn.style.backgroundColor = level.bg;
            btn.style.color = level.fg;
            btn.innerText = level.label;
            if(level.label.length > 1) {
                btn.style.fontSize = '0.75rem';
                btn.style.lineHeight = '1';
                btn.style.letterSpacing = '-1px';
            }
            btn.onclick = () => {
                currentSelectedLevel = level.id;
                updateSelectorUI();
            };
            selector.appendChild(btn);
        });
        updateSelectorUI();

        // 凡例を描画
        const legendTarget = document.getElementById('legend-list-target');
        shindoLevels.forEach(level => {
            const row = document.createElement('div');
            row.className = 'flex items-center gap-1.5';
            row.innerHTML = `
                <span class="w-5 h-4 rounded text-center font-black leading-none text-[10px] flex items-center justify-center border border-black/40" style="background-color: ${level.bg}; color: ${level.fg};">${level.label}</span>
                <span class="text-[9px] text-gray-300">震度 ${level.label}</span>
            `;
            legendTarget.appendChild(row);
        });

        // セレクトボックスへの流し込み
        const regionSelect = document.getElementById('region-select');
        Object.values(epicenterData).forEach(ep => {
            const option = document.createElement('option');
            option.value = ep.code;
            option.textContent = `${ep.name} [${ep.code}]`;
            regionSelect.appendChild(option);
        });

        // テロップ情報同期
        const inputTime = document.getElementById('input-time');
        const inputMag = document.getElementById('input-mag');
        const inputTowns = document.getElementById('input-towns');
        const selectMaxShindo = document.getElementById('select-max-shindo');

        const nhkTimeVal = document.getElementById('nhk-time-val');
        const nhkMagVal = document.getElementById('nhk-mag-val');
        const nhkTownsList = document.getElementById('nhk-towns-list');
        const nhkMaxVal = document.getElementById('nhk-max-val');

        function syncNhkPanels() {
            nhkTimeVal.textContent = inputTime.value;
            nhkMagVal.textContent = inputMag.value;
            nhkTownsList.textContent = inputTowns.value;
            nhkMaxVal.textContent = selectMaxShindo.value;
            
            // 最大震度表示部分の背景カラーを自動連動
            const maxLevelObj = shindoLevels.find(l => l.id === selectMaxShindo.value);
            const parentMaxBox = nhkMaxVal.parentElement;
            if (maxLevelObj && parentMaxBox) {
                parentMaxBox.style.background = `linear-gradient(to bottom, ${maxLevelObj.bg}, ${maxLevelObj.bg}dd)`;
                nhkMaxVal.style.color = maxLevelObj.fg;
                // 最大震度「最大震度」ラベルの文字色
                parentMaxBox.querySelector('span').style.color = maxLevelObj.fg;
            }
        }

        inputTime.addEventListener('input', syncNhkPanels);
        inputMag.addEventListener('input', syncNhkPanels);
        inputTowns.addEventListener('input', syncNhkPanels);
        selectMaxShindo.addEventListener('change', syncNhkPanels);
        syncNhkPanels();

        // --------------------------------------------------
        // 地図のセットアップ (D3.js)
        // --------------------------------------------------
        const container = document.getElementById('map-container');
        let width = container.clientWidth;
        let height = container.clientHeight;

        const svg = d3.select('#map-container').append('svg')
            .attr('id', 'map-svg')
            .attr('width', width)
            .attr('height', height)
            .style('background-color', '#264ed1') // ユーザー指定の海カラー
            .style('display', 'block');

        // グループ構造
        const mapLayer = svg.append('g').attr('id', 'map-layer').attr('shape-rendering', 'optimizeSpeed');
        const areaBorderLayer = svg.append('g').attr('id', 'area-border-layer').attr('shape-rendering', 'optimizeSpeed'); // 一次細分区域の境界
        const prefBorderLayer = svg.append('g').attr('id', 'pref-border-layer').attr('shape-rendering', 'optimizeSpeed'); // 都道府県境界
        const epicenterLayer = svg.append('g').attr('id', 'epicenter-layer'); // 震源地マーク
        const iconLayer = svg.append('g').attr('id', 'icon-layer'); // 震度アイコン

        // プロジェクション設定
        const projection = d3.geoMercator()
            .center([131.6, 32.2]) // 初期フォーカスを九州・宮崎沖へ
            .scale(4200)
            .translate([width / 2.3, height / 1.7]);

        const path = d3.geoPath().projection(projection);

        // ズーム制御
        const zoom = d3.zoom()
            .scaleExtent([0.5, 100])
            .on('zoom', (event) => {
                currentTransform = event.transform;
                const k = event.transform.k;
                mapLayer.attr('transform', event.transform);
                prefBorderLayer.attr('transform', event.transform);
                areaBorderLayer.attr('transform', event.transform);
                
                // ズーム倍率に合わせて線の太さを調整（non-scaling-strokeの代替で軽量化）
                prefBorderLayer.selectAll('path').attr('stroke-width', 1.5 / k);
                areaBorderLayer.selectAll('path')
                    .attr('stroke-width', 0.6 / k)
                    .attr('stroke-dasharray', `${2/k}, ${2/k}`);

                updateEpicenterPosition();
                updateIconPositions();
            });

        svg.call(zoom);

        // --------------------------------------------------
        // 地図データの読み込み
        // --------------------------------------------------
        const topoJsonUrl = './japan.topojson';
        const jmaEqGeoJsonUrl = './earthquake.json';

        Promise.all([
            d3.json(topoJsonUrl),
            d3.json(jmaEqGeoJsonUrl).catch(err => {
                console.warn("気象庁の細分区域GeoJSONが取得できませんでした。近似値を利用します。", err);
                return null;
            })
        ]).then(([topoData, eqGeoJson]) => {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 300);

            const geojson = topojson.feature(topoData, topoData.objects.japan);

            // ① 陸地データの描画 (#a68d79)
            mapLayer.selectAll('path')
                .data(geojson.features)
                .enter()
                .append('path')
                .attr('d', path)
                .attr('fill', '#a68d79'); // vector-effectを削除して軽量化

            // ② 一次細分区域(震央地名)データの描画と解析
            if (eqGeoJson && eqGeoJson.features) {
                // 一次細分区域の境界線を別レイヤーに重ねる
                areaBorderLayer.selectAll('path')
                    .data(eqGeoJson.features)
                    .enter()
                    .append('path')
                    .attr('d', path)
                    .attr('fill', 'none')
                    .attr('stroke', '#715a40') // 細分区域の境界 (県境より薄く細い)
                    .attr('stroke-width', 0.6)
                    .attr('stroke-dasharray', '2, 2'); // vector-effectを削除して軽量化

                // 都道府県境界線の描画 (太めの境界線)
                prefBorderLayer.selectAll('path')
                    .data(geojson.features)
                    .enter()
                    .append('path')
                    .attr('d', path)
                    .attr('fill', 'none')
                    .attr('stroke', '#4a3319') // 県境界
                    .attr('stroke-width', 1.5); // vector-effectを削除して軽量化

                // 震央地名のマッピング
                eqGeoJson.features.forEach(feature => {
                    const props = feature.properties;
                    let code = props.code || props.id || props.regioncode;
                    
                    if (!code) {
                        const matched = Object.values(epicenterData).find(e => e.name === props.name);
                        if (matched) code = matched.code;
                    }

                    if (code && epicenterData[code]) {
                        epicenterData[code].feature = feature;
                        const centroid = d3.geoCentroid(feature);
                        epicenterData[code].lon = centroid[0];
                        epicenterData[code].lat = centroid[1];
                    }
                });
            }

            // 初期配置デモ
            // 宮崎県南部平野部 [762]、宮崎県北部平野部 [760]、宮崎県南部山沿い [763]、鹿児島県大隅 [771]
            const initialDemo = [
                { code: '762', level: '4' },
                { code: '763', level: '3' },
                { code: '760', level: '3' },
                { code: '771', level: '2' }
            ];

            initialDemo.forEach(item => {
                const ep = epicenterData[item.code];
                if (ep && ep.lon) {
                    icons.push({
                        id: Date.now() + Math.random(),
                        code: item.code,
                        lon: ep.lon,
                        lat: ep.lat,
                        level: item.level,
                        name: ep.name
                    });
                }
            });

            renderIcons();
            drawEpicenter();
        }).catch(err => {
            console.error("地図読み込みエラー:", err);
            document.getElementById('loading').innerHTML = '<span class="text-red-400 font-bold">地図データの読み込みに失敗しました。ネット環境を確認してください。</span>';
        });

        // --------------------------------------------------
        // インタラクションと描画ロジック
        // --------------------------------------------------

        // マップクリック時の分岐（震度配置 or 震源地移動）
        svg.on('click', (event) => {
            if (event.defaultPrevented) return;

            const [x, y] = d3.pointer(event);
            const invertedPoint = currentTransform.invert([x, y]);
            const [lon, lat] = projection.invert(invertedPoint);

            if (activeMode === 'epicenter') {
                // 震源地モード：クリックされた位置に✖マークを即座に移動
                epicenterLocation.lon = lon;
                epicenterLocation.lat = lat;
                epicenterLocation.visible = true;
                drawEpicenter();
            } else {
                // 震度配置モード
                let targetCode = null;
                let minDistance = Infinity;

                // クリックされた位置に最も近い、または中に含まれる区域を検索
                for (const code in epicenterData) {
                    const ep = epicenterData[code];
                    if (!ep.feature || !ep.lon || !ep.lat) continue;

                    if (d3.geoContains(ep.feature, [lon, lat])) {
                        targetCode = code;
                        break;
                    }

                    const dist = d3.geoDistance([lon, lat], [ep.lon, ep.lat]);
                    if (dist < minDistance) {
                        minDistance = dist;
                        targetCode = code;
                    }
                }

                if (targetCode && epicenterData[targetCode].lon) {
                    const ep = epicenterData[targetCode];
                    // 重複回避（上書き）
                    icons = icons.filter(icon => icon.code !== targetCode);
                    
                    icons.push({
                        id: Date.now(),
                        code: targetCode,
                        lon: ep.lon,
                        lat: ep.lat,
                        level: currentSelectedLevel,
                        name: ep.name
                    });

                    // 同期してUI更新
                    regionSelect.value = targetCode;
                } else {
                    // フォールバック
                    icons.push({
                        id: Date.now(),
                        code: null,
                        lon: lon,
                        lat: lat,
                        level: currentSelectedLevel,
                        name: "不明地域"
                    });
                }
                renderIcons();
            }
        });

        // 「配置」ボタン (セレクトボックスで指定) の制御
        document.getElementById('btn-add-region').addEventListener('click', () => {
            const code = regionSelect.value;
            if (!code) return;

            const ep = epicenterData[code];
            if (ep && ep.lon && ep.lat) {
                icons = icons.filter(icon => icon.code !== code);
                icons.push({
                    id: Date.now(),
                    code: code,
                    lon: ep.lon,
                    lat: ep.lat,
                    level: currentSelectedLevel,
                    name: ep.name
                });
                renderIcons();
            }
        });

        // 震度アイコンの描画処理
        function renderIcons() {
            const iconGroups = iconLayer.selectAll('g.shindo-icon')
                .data(icons, d => d.id);

            const enter = iconGroups.enter()
                .append('g')
                .attr('class', 'shindo-icon')
                .style('cursor', 'pointer')
                .on('click', (event, d) => {
                    event.stopPropagation();
                    // アイコンクリックで個別消去
                    icons = icons.filter(icon => icon.id !== d.id);
                    renderIcons();
                });

            // ツールチップ表示
            enter.append('title')
                .text(d => d.name ? `${d.name} (震度 ${d.level})` : `震度 ${d.level}`);

            // NHKライクな少し丸みのある立体的な震度アイコン
            enter.append('rect')
                .attr('x', -14)
                .attr('y', -14)
                .attr('width', 28)
                .attr('height', 28)
                .attr('rx', 4)
                .attr('ry', 4)
                .attr('stroke', '#111')
                .attr('stroke-width', 1.5)
                .attr('fill', d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.bg : '#FFF';
                });

            // 影効果のためのテキスト背後用の白い縁
            enter.append('text')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .attr('font-family', '"Helvetica Neue", Arial, sans-serif')
                .attr('font-weight', '900')
                .attr('stroke', d => {
                    // 黒文字の震度には白いアウトライン、白文字には黒いアウトラインを入れてNHK風再現
                    const level = shindoLevels.find(l => l.id === d.level);
                    return (level && level.fg === '#000000') ? '#ffffff' : '#000000';
                })
                .attr('stroke-width', 2)
                .attr('paint-order', 'stroke fill')
                .attr('fill', d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.fg : '#000';
                })
                .attr('font-size', d => {
                    return d.level.length > 1 ? '11px' : '18px';
                })
                .attr('letter-spacing', d => {
                    return d.level.length > 1 ? '-1px' : '0px';
                })
                .attr('dy', '0.05em')
                .text(d => {
                    const level = shindoLevels.find(l => l.id === d.level);
                    return level ? level.label : '';
                });

            iconGroups.exit().remove();
            updateIconPositions();
        }

        // アイコン位置のズーム自動更新
        function updateIconPositions() {
            iconLayer.selectAll('g.shindo-icon')
                .attr('transform', d => {
                    const projected = projection([d.lon, d.lat]);
                    if (!projected) return `translate(-2000, -2000)`;
                    const [x, y] = projected;
                    const tx = currentTransform.applyX(x);
                    const ty = currentTransform.applyY(y);
                    return `translate(${tx}, ${ty})`;
                });
        }

        // 震源地（黄枠の赤い✖マーク）の描画
        function drawEpicenter() {
            epicenterLayer.selectAll('*').remove();
            if (!epicenterLocation.visible) return;

            // ドラッグ移動ができるようにD3 Dragを実装
            const dragHandler = d3.drag()
                .on('drag', (event) => {
                    const [x, y] = d3.pointer(event, svg.node());
                    const invertedPoint = currentTransform.invert([x, y]);
                    const [lon, lat] = projection.invert(invertedPoint);
                    epicenterLocation.lon = lon;
                    epicenterLocation.lat = lat;
                    updateEpicenterPosition();
                });

            const epiGroup = epicenterLayer.append('g')
                .attr('id', 'epicenter-mark')
                .style('cursor', 'move')
                .call(dragHandler);

            // NHK風の赤地に黄ふちの✖マーク
            // 太い黄色の✖を描画し、その上に一回り細い赤色の✖を重ねる
            const size = 16;

            // 外側の太い黄色✖
            epiGroup.append('line')
                .attr('x1', -size)
                .attr('y1', -size)
                .attr('x2', size)
                .attr('y2', size)
                .attr('stroke', '#FFFF00')
                .attr('stroke-width', 6)
                .attr('stroke-linecap', 'round');

            epiGroup.append('line')
                .attr('x1', size)
                .attr('y1', -size)
                .attr('x2', -size)
                .attr('y2', size)
                .attr('stroke', '#FFFF00')
                .attr('stroke-width', 6)
                .attr('stroke-linecap', 'round');

            // 内側の赤✖
            epiGroup.append('line')
                .attr('x1', -size)
                .attr('y1', -size)
                .attr('x2', size)
                .attr('y2', size)
                .attr('stroke', '#E60012')
                .attr('stroke-width', 3)
                .attr('stroke-linecap', 'round');

            epiGroup.append('line')
                .attr('x1', size)
                .attr('y1', -size)
                .attr('x2', -size)
                .attr('y2', size)
                .attr('stroke', '#E60012')
                .attr('stroke-width', 3)
                .attr('stroke-linecap', 'round');

            updateEpicenterPosition();
        }

        function updateEpicenterPosition() {
            const projected = projection([epicenterLocation.lon, epicenterLocation.lat]);
            if (!projected) return;
            const [x, y] = projected;
            const tx = currentTransform.applyX(x);
            const ty = currentTransform.applyY(y);
            epicenterLayer.select('#epicenter-mark')
                .attr('transform', `translate(${tx}, ${ty})`);
        }

        // --------------------------------------------------
        // リサイズ・ユーティリティ・画像書き出し
        // --------------------------------------------------
        window.addEventListener('resize', () => {
            width = container.clientWidth;
            height = container.clientHeight;
            
            svg.attr('width', width).attr('height', height);
            projection.translate([width / 2.3, height / 1.7]);

            mapLayer.selectAll('path').attr('d', path);
            areaBorderLayer.selectAll('path').attr('d', path);
            prefBorderLayer.selectAll('path').attr('d', path);
            
            updateIconPositions();
            updateEpicenterPosition();
        });

        document.getElementById('btn-reset-zoom').addEventListener('click', () => {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            icons = [];
            renderIcons();
            epicenterLocation.visible = false;
            drawEpicenter();
        });

        // 画像の保存機能（Canvas高解像度エクスポート、NHK風パネルとオーバーレイを全統合）
        document.getElementById('btn-download').addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // 1. 背景の海を描画
            ctx.fillStyle = '#264ed1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 地図要素 (D3 SVG) をシリアライズしてCanvasへ合成
            const svgElement = document.getElementById('map-svg');
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgElement);
            
            if (!svgString.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
                svgString = svgString.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }

            const img = new Image();
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            
            img.onload = () => {
                ctx.drawImage(img, 0, 0);

                // 3. NHKテロップオーバーレイをCanvasに直接美麗レンダリング
                // --- NHKロゴを描画 (右上) ---
                ctx.font = 'italic font-black 24px Arial, sans-serif';
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
                ctx.shadowBlur = 4;
                ctx.fillText('NHK', width - 85, 38);

                // --- 発生情報テロップ帯 (上部) ---
                const headerX = 24;
                const headerY = 16;
                const maxBoxWidth = 100;
                const barHeight = 44;
                
                // 最大震度ボックス背景
                const maxLevelObj = shindoLevels.find(l => l.id === selectMaxShindo.value);
                const maxBg = maxLevelObj ? maxLevelObj.bg : '#ff8c1a';
                const maxFg = maxLevelObj ? maxLevelObj.fg : '#000000';

                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = maxBg;
                ctx.fillRect(headerX, headerY, maxBoxWidth, barHeight);

                // 地震情報帯背景 (グラデーション)
                const infoGrad = ctx.createLinearGradient(headerX + maxBoxWidth, headerY, headerX + maxBoxWidth, headerY + barHeight);
                infoGrad.addColorStop(0, '#5c7bb5');
                infoGrad.addColorStop(1, '#3a548c');
                ctx.fillStyle = infoGrad;
                
                // 帯の幅を文字長に応じて可変
                const infoText = `${inputTime.value}   M${inputMag.value}`;
                ctx.font = 'bold 16px sans-serif';
                const textWidth = ctx.measureText(infoText).width;
                const barWidth = textWidth + 60;
                ctx.fillRect(headerX + maxBoxWidth, headerY, barWidth, barHeight);

                // 白縁取りの描画
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2.5;
                ctx.strokeRect(headerX, headerY, maxBoxWidth, barHeight);
                ctx.strokeRect(headerX + maxBoxWidth, headerY, barWidth, barHeight);

                ctx.shadowBlur = 0; // 影初期化

                // 最大震度テキスト
                ctx.fillStyle = maxFg;
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('最大震度', headerX + maxBoxWidth / 2, headerY + 14);

                ctx.font = '900 24px "Helvetica Neue", Arial, sans-serif';
                ctx.fillText(selectMaxShindo.value, headerX + maxBoxWidth / 2, headerY + 36);

                // 日時・マグニチュードテキスト
                ctx.textAlign = 'left';
                ctx.font = 'bold 16px "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif';
                
                const drawOutlineText = (txt, tx, ty, fill, stroke) => {
                    ctx.strokeStyle = stroke;
                    ctx.lineWidth = 3.5;
                    ctx.strokeText(txt, tx, ty);
                    ctx.fillStyle = fill;
                    ctx.fillText(txt, tx, ty);
                };

                // 日時描画
                const timeText = inputTime.value;
                drawOutlineText(timeText, headerX + maxBoxWidth + 20, headerY + 28, '#ffffff', '#000000');

                // M描画 (黄色)
                const magText = `M${inputMag.value}`;
                const timeWidth = ctx.measureText(timeText).width;
                drawOutlineText(magText, headerX + maxBoxWidth + 20 + timeWidth + 20, headerY + 28, '#ffff00', '#000000');

                // --- 左側: 市区町村パネル ---
                const townLines = inputTowns.value.split('\n');
                if (townLines.length > 0 && townLines[0].trim() !== '') {
                    const townY = 80;
                    const townX = 24;
                    const townLineHeight = 24;
                    const townPad = 8;
                    const townBoxHeight = (townLines.length * townLineHeight) + (townPad * 2);
                    const townBoxWidth = 150;

                    // 背景
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.fillRect(townX, townY, townBoxWidth, townBoxHeight);

                    // 左のオレンジインジケータ
                    ctx.fillStyle = '#ff8c1a';
                    ctx.fillRect(townX, townY, 4, townBoxHeight);

                    // テキスト
                    ctx.font = 'bold 14px "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif';
                    ctx.textAlign = 'left';
                    townLines.forEach((line, index) => {
                        drawOutlineText(line.trim(), townX + 12, townY + townPad + 16 + (index * townLineHeight), '#ffffff', '#000000');
                    });
                }

                // --- 右下: 凡例を描画 ---
                const legW = 100;
                const legH = 210;
                const legX = width - legW - 20;
                const legY = height - legH - 20;

                ctx.fillStyle = 'rgba(15, 30, 50, 0.8)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.fillRect(legX, legY, legW, legH);
                ctx.strokeRect(legX, legY, legW, legH);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('震度凡例', legX + legW / 2, legY + 16);

                shindoLevels.forEach((level, index) => {
                    const ly = legY + 30 + (index * 19);
                    
                    // 色ブロック
                    ctx.fillStyle = level.bg;
                    ctx.fillRect(legX + 12, ly, 20, 14);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(legX + 12, ly, 20, 14);

                    // 文字
                    ctx.fillStyle = level.fg;
                    ctx.font = 'bold 10px sans-serif';
                    ctx.fillText(level.label, legX + 22, ly + 11);

                    // ラベル
                    ctx.fillStyle = '#cccccc';
                    ctx.font = '9px sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText(`震度 ${level.label}`, legX + 40, ly + 11);
                    ctx.textAlign = 'center';
                });

                // 4. ダウンロード実行
                const pngUrl = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = pngUrl;
                downloadLink.download = `NHK_shindo_${Date.now()}.png`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        });

    </script>
</body>
</html>
